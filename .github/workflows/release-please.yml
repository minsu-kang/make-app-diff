name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build for (e.g. v1.1.0)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build-mac:
    needs: release-please
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       needs.release-please.outputs.release_created == 'true')
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Package DMG
        run: npx electron-builder --mac dmg --publish never

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}
          files: dist/*.dmg

  build-win:
    needs: release-please
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       needs.release-please.outputs.release_created == 'true')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Package EXE
        run: npx electron-builder --win --publish never

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}
          files: dist/*.exe
