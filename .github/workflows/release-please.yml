name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build for (e.g. v1.1.0)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PAT }}

  build-mac:
    needs: release-please
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       needs.release-please.outputs.release_created == 'true')
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Package DMG
        run: npx electron-builder --mac dmg --publish never

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}
          files: dist/*.dmg

  build-win:
    needs: release-please
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       needs.release-please.outputs.release_created == 'true')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Package EXE
        run: npx electron-builder --win --publish never

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}
          files: dist/*.exe

  update-homebrew:
    needs: [release-please, build-mac]
    if: ${{ needs.build-mac.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Get version from tag
        id: version
        run: |
          TAG="${{ inputs.tag_name || needs.release-please.outputs.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          curl -sL -o makediff.dmg "https://github.com/minsu-kang/make-app-diff/releases/download/v${VERSION}/MakeDiff-${VERSION}-arm64.dmg"
          SHA=$(sha256sum makediff.dmg | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Cask formula
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          git clone https://x-access-token:${GH_TOKEN}@github.com/minsu-kang/homebrew-makediff.git
          cd homebrew-makediff

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/makediff.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/makediff.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/makediff.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update MakeDiff to v${VERSION}"
          git push
